version: '3.8'

services:
  database:
    image: postgres:15
    container_name: invoice_payment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_payment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice_payment_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/invoice_payment
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        sqlx database create --database-url $DATABASE_URL &&
        sqlx migrate run --database-url $DATABASE_URL &&
        echo 'Starting backend...' &&
        cargo run --bin backend
      "

volumes:
  postgres_data:
